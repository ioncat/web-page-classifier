<div class="bg-white rounded-xl border border-gray-200 p-4 hover:border-blue-300 hover:shadow-sm transition-all duration-150">

  <!-- Title / URL -->
  <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer"
     class="text-base font-semibold text-blue-700 hover:text-blue-900 hover:underline line-clamp-2 leading-snug">
    {{ item.title or item.url }}
  </a>

  <!-- Description -->
  {% if item.description %}
  <p class="mt-2 text-sm text-gray-600 line-clamp-3 leading-relaxed">
    {{ item.description }}
  </p>
  {% endif %}

  <!-- Footer: domain + categories -->
  <div class="mt-3 flex flex-wrap items-center gap-2">
    <span class="text-xs text-gray-400 font-mono truncate max-w-[180px]">{{ item.domain }}</span>
    {% for cat in item.categories_list %}
    <a href="/category/{{ cat | urlencode }}"
       class="text-xs px-2 py-0.5 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100">
      {{ cat }}
    </a>
    {% endfor %}
  </div>

</div>
