<div class="url-card bg-white rounded-xl border border-gray-200 p-4 hover:border-blue-300 hover:shadow-sm transition-all duration-150"
     data-id="{{ item.id }}"
     draggable="true">

  <!-- Title + action buttons -->
  <div class="flex items-start justify-between gap-2">
    <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer"
       class="text-base font-semibold text-blue-700 hover:text-blue-900 hover:underline line-clamp-2 leading-snug">
      {{ item.title or item.url }}
    </a>
    <div class="flex shrink-0 gap-1">
      <!-- Move button -->
      <button class="btn-move p-1.5 rounded-lg text-gray-300 hover:text-green-600 hover:bg-green-50 transition-colors"
              title="Переместить в категорию">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
        </svg>
      </button>
      <!-- Delete button -->
      <button class="btn-delete p-1.5 rounded-lg text-gray-300 hover:text-red-500 hover:bg-red-50 transition-colors"
              title="Удалить из базы">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Description -->
  {% if item.description %}
  <p class="mt-2 text-sm text-gray-600 line-clamp-3 leading-relaxed">
    {{ item.description }}
  </p>
  {% endif %}

  <!-- Footer: domain + categories -->
  <div class="mt-3 flex flex-wrap items-center gap-2">
    <span class="text-xs text-gray-300 font-mono">#{{ item.id }}</span>
    <span class="text-xs text-gray-400 font-mono truncate max-w-[180px]">{{ item.domain }}</span>
    {% for cat in item.categories_list %}
    <a href="/category/{{ cat | urlencode }}"
       class="card-cat-badge text-xs px-2 py-0.5 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100">
      {{ cat }}
    </a>
    {% endfor %}
  </div>

</div>
